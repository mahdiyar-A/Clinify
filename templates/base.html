{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinify – {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span>Clinify</span>
            <small>{% block role_label %}{% endblock %}</small>
        </div>

        <nav class="sidebar-nav">
            {% block nav %}{% endblock %}
        </nav>

        <div class="sidebar-footer">
            <a href="{% url 'logout' %}" class="btn btn-outline btn-full">Sign out</a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

</div>
<script src="{% static 'js/script.js' %}"></script>
<script>lucide.createIcons();</script>
</body>
</html>
