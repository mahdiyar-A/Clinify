{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinify – Register</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card" style="max-width:520px;">
        <div class="logo">Clinify</div>
        <div class="tagline">Create a patient account</div>

        <h2>Register</h2>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-error" style="margin-bottom:16px;">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" placeholder="Last name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@email.com" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="403-000-0000">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" name="date_of_birth" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" placeholder="123 Main St, Calgary">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Emergency Contact Name</label>
                    <input type="text" name="emergency_contact_name" placeholder="Full name">
                </div>
                <div class="form-group">
                    <label>Emergency Contact Phone</label>
                    <input type="text" name="emergency_contact_phone" placeholder="403-000-0000">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Create Account</button>
        </form>

        <hr class="divider">
        <p style="font-size:13px; color:var(--muted); text-align:center;">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
