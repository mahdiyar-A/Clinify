{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinify – Register</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card" style="max-width:460px;">
        <div class="logo">Clinify</div>
        <div class="tagline">Create an account</div>

        <h2>I am a...</h2>

        <div style="display:flex; flex-direction:column; gap:12px; margin-top:16px;">
            <a href="{% url 'register_patient' %}" class="btn btn-primary btn-full">Patient</a>
            <a href="{% url 'register_doctor' %}" class="btn btn-secondary btn-full">Doctor</a>
        </div>

        <p style="font-size:12px; color:var(--muted); text-align:center; margin-top:16px;">
            Admin accounts are provisioned by an existing administrator.
        </p>

        <hr class="divider">
        <p style="font-size:13px; color:var(--muted); text-align:center;">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
