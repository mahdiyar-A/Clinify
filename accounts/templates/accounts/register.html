{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinify – Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="logo">Clinify</div>
        <div class="tagline">Create an account</div>

        <h2>Choose your role</h2>

        <div class="role-options">
            <a href="{% url 'register_patient' %}" class="role-card">
                <span class="role-text">
                    <div class="role-title">Patient</div>
                    <div class="role-desc">Book appointments and manage your medical record.</div>
                </span>
                <span class="role-arrow">&rarr;</span>
            </a>
            <a href="{% url 'register_doctor' %}" class="role-card">
                <span class="role-text">
                    <div class="role-title">Doctor</div>
                    <div class="role-desc">Manage your schedule, patients, and prescriptions.</div>
                </span>
                <span class="role-arrow">&rarr;</span>
            </a>
        </div>

        <div class="auth-note">
            Admin accounts are provisioned by an existing administrator.
        </div>

        <hr class="divider">
        <p style="font-size:13px; color:var(--muted); text-align:center;">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
