{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinify – Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="logo">Clinify</div>
        <div class="tagline">Clinic Management System</div>

        <h2>Sign in</h2>

        {% if messages %}
            {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}" style="margin-bottom:16px;">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@email.com" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" autocomplete="off" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Sign in</button>
        </form>

        <hr class="divider">
        <p style="font-size:13px; color:var(--muted); text-align:center;">
            Don't have an account? <a href="{% url 'register' %}">Register</a>
        </p>
    </div>
</div>
</body>
</html>
